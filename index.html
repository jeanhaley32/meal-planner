<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meal Planner</title>
  <style>
    /* ── Variables ───────────────────────────────────────────────────────────── */
    :root {
      --bg:     #FAF8F3;
      --ink:    #1C1610;
      --gold:   #C4A882;
      --muted:  #9A8060;
      --border: #E5DDD0;
      --dark:   #2C2416;
      --white:  #FFFFFF;
      --cream:  #F0EBE2;
      --light:  #EDE5D8;
      --nav-h:  64px;
      --sb:     env(safe-area-inset-bottom, 0px);
    }

    /* ── Reset ───────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--ink);
      height: 100dvh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── App shell ───────────────────────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100dvh; }
    main { flex: 1; overflow: hidden; position: relative; }

    .screen {
      position: absolute; inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--nav-h) + var(--sb) + 24px);
    }
    .screen.hidden { display: none !important; }

    /* ── Bottom nav ──────────────────────────────────────────────────────────── */
    #bottom-nav {
      height: calc(var(--nav-h) + var(--sb));
      padding-bottom: var(--sb);
      background: rgba(250,248,243,0.97);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; background: none; border: none; cursor: pointer;
      font-family: inherit;
    }
    .nav-icon { font-size: 22px; line-height: 1; opacity: 0.4; transition: opacity .15s; }
    .nav-label { font-size: 11px; letter-spacing: .5px; font-weight: 500; color: var(--muted); transition: color .15s; }
    .nav-btn.active .nav-icon  { opacity: 1; }
    .nav-btn.active .nav-label { color: var(--dark); }

    /* ── Screen headers ──────────────────────────────────────────────────────── */
    .screen-header {
      padding: 16px 20px 12px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .eyebrow {
      font-size: 11px; letter-spacing: 1.6px;
      text-transform: uppercase; color: var(--muted);
    }
    .screen-title {
      font-size: 28px; font-weight: 700; color: var(--ink);
      letter-spacing: -.5px; line-height: 1.1;
    }
    .screen-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── Shared buttons ──────────────────────────────────────────────────────── */
    .icon-btn {
      width: 44px; height: 44px; border-radius: 14px;
      background: var(--dark); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: #fff; font-family: inherit; flex-shrink: 0;
      line-height: 1;
    }
    .icon-btn:active { opacity: .8; }

    .pill-btn {
      border: 1.5px solid var(--border); border-radius: 20px;
      padding: 7px 14px; background: var(--white); font-family: inherit;
      font-size: 13px; color: var(--muted); cursor: pointer;
    }
    .pill-btn:active { opacity: .7; }

    .go-btn {
      margin-top: 20px; background: var(--dark); border: none;
      border-radius: 30px; padding: 12px 28px; font-size: 15px;
      color: #fff; font-family: inherit; cursor: pointer;
    }
    .go-btn:active { opacity: .8; }

    /* ── Plan — day chips ────────────────────────────────────────────────────── */
    .day-scroll {
      display: flex; gap: 8px; padding: 0 20px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .day-scroll::-webkit-scrollbar { display: none; }

    .day-chip {
      width: 52px; height: 68px; border-radius: 16px;
      border: 1.5px solid var(--border); background: var(--white);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; cursor: pointer;
      flex-shrink: 0; font-family: inherit; position: relative;
    }
    .day-chip.active  { background: var(--dark); border-color: var(--dark); }
    .day-chip.weekend .day-name,
    .day-chip.weekend .day-num { color: var(--gold); }
    .day-chip.active  .day-name { color: rgba(255,255,255,.6); }
    .day-chip.active  .day-num  { color: #fff; }

    .day-name { font-size: 10px; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); }
    .day-num  { font-size: 18px; font-weight: 700; color: var(--ink); }
    .day-chip-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--gold); position: absolute; bottom: 8px; opacity: .6;
    }
    .day-chip.active .day-chip-dot { opacity: 1; }

    .day-label-row { padding: 16px 20px 10px; }
    .day-label { font-size: 18px; font-weight: 600; color: var(--ink); }

    /* ── Plan — slot cards ───────────────────────────────────────────────────── */
    .slot-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--white); border-radius: 16px;
      border: 1.5px solid var(--border); padding: 14px;
      margin: 0 16px 10px; cursor: pointer;
    }
    .slot-card:active { opacity: .85; }
    .slot-icon {
      width: 44px; height: 44px; border-radius: 13px; background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .slot-icon.filled { background: var(--dark); }
    .slot-text  { flex: 1; min-width: 0; }
    .slot-label { font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
    .slot-name  { font-size: 15px; font-weight: 600; color: var(--ink); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .slot-empty { font-size: 14px; color: #C8BDB0; margin-top: 1px; }
    .slot-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .slot-action-btn {
      width: 34px; height: 34px; border-radius: 10px; background: var(--cream);
      border: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 16px; font-family: inherit;
    }
    .slot-action-btn.remove { font-size: 20px; color: var(--muted); font-weight: 300; line-height: 1; }
    .slot-action-btn:active { opacity: .7; }
    .slot-add {
      width: 30px; height: 30px; border-radius: 10px;
      border: 1.5px dashed var(--border); display: flex;
      align-items: center; justify-content: center;
      font-size: 18px; color: var(--border); flex-shrink: 0;
    }

    /* ── Recipes list ────────────────────────────────────────────────────────── */
    .recipe-list { border-top: 1px solid var(--border); }
    .recipe-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: var(--white); cursor: pointer;
    }
    .recipe-row:active { background: rgba(196,168,130,.1); }
    .recipe-icon {
      width: 40px; height: 40px; border-radius: 12px; background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .recipe-text { flex: 1; min-width: 0; }
    .recipe-name { font-size: 15px; font-weight: 600; color: var(--ink); }
    .recipe-sub  { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .delete-btn {
      width: 32px; height: 32px; border-radius: 8px; background: #F8F0EE;
      border: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 12px; color: #C0796A;
      font-weight: 600; flex-shrink: 0; font-family: inherit;
    }
    .delete-btn:active { opacity: .7; }

    /* ── Shopping ────────────────────────────────────────────────────────────── */
    .shopping-list-wrap { border-top: 1px solid var(--border); }
    .shopping-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: var(--white); cursor: pointer;
    }
    .shopping-row.done { background: rgba(196,168,130,.07); }
    .shopping-row:active { opacity: .7; }
    .checkbox {
      width: 22px; height: 22px; border-radius: 7px;
      border: 2px solid var(--gold); display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .checkbox.checked { background: var(--gold); border-color: var(--gold); }
    .checkbox.checked::after { content: '✓'; font-size: 12px; color: #fff; font-weight: 700; }
    .shopping-name { flex: 1; font-size: 17px; color: var(--ink); }
    .shopping-row.done .shopping-name { color: #C8BDB0; text-decoration: line-through; }
    .shopping-qty { font-size: 14px; color: var(--muted); font-style: italic; }

    /* ── Book screen ─────────────────────────────────────────────────────────── */
    .book-actions {
      display: flex; gap: 10px; padding: 0 16px 16px; flex-wrap: wrap;
    }
    .book-btn {
      flex: 1; min-width: 130px; padding: 12px 16px; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--white);
      font-family: inherit; font-size: 14px; color: var(--ink);
      cursor: pointer; text-align: center;
    }
    .book-btn.primary { background: var(--dark); color: #fff; border-color: var(--dark); }
    .book-btn:active { opacity: .8; }

    .book-preview { padding: 0 16px; }
    .book-recipe-card {
      background: var(--white); border-radius: 16px;
      border: 1.5px solid var(--border); padding: 20px; margin-bottom: 12px;
    }
    .book-recipe-name {
      font-size: 20px; font-weight: 700; color: var(--ink);
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .book-section-label {
      font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .book-ing-row {
      display: flex; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid var(--light); font-size: 14px;
    }
    .book-ing-row:last-of-type { border-bottom: none; }
    .book-ing-qty { color: var(--muted); font-style: italic; }
    .book-dir-row { display: flex; gap: 12px; padding: 6px 0; }
    .book-dir-num { font-size: 18px; color: var(--gold); font-weight: 700; font-style: italic; width: 22px; flex-shrink: 0; }
    .book-dir-text { font-size: 14px; line-height: 1.6; color: var(--ink); }

    /* ── Banner ──────────────────────────────────────────────────────────────── */
    .banner {
      margin: 0 16px 10px; background: #e8f5e9; border-radius: 12px;
      padding: 12px; border: 1px solid #c8e6c9; font-size: 14px; color: #2e7d32;
    }

    /* ── Empty state ─────────────────────────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px; text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty-text { font-size: 16px; color: var(--muted); line-height: 1.6; }

    /* ── Modal overlay ───────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 100; display: flex; flex-direction: column; justify-content: flex-end;
    }
    .modal-overlay.hidden { display: none !important; }

    .modal {
      background: var(--bg); border-radius: 24px 24px 0 0;
      max-height: 92dvh; display: flex; flex-direction: column;
      padding-bottom: var(--sb);
    }
    .modal.hidden { display: none !important; }

    .modal-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 10px auto 0; flex-shrink: 0;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--ink); }
    .modal-cancel {
      font-size: 15px; color: var(--muted); background: none;
      border: none; cursor: pointer; font-family: inherit;
    }
    .modal-cancel:active { opacity: .7; }
    .modal-body { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }

    /* ── Detail modal ────────────────────────────────────────────────────────── */
    .detail-header { padding: 12px 20px 0; flex-shrink: 0; }
    .detail-recipe-name { font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 14px; letter-spacing: -.3px; }
    .tab-bar {
      display: flex; background: var(--light); border-radius: 12px;
      padding: 3px; gap: 3px; margin-bottom: 12px;
    }
    .tab-btn {
      flex: 1; padding: 8px; border-radius: 10px; border: none;
      background: none; font-family: inherit; font-size: 14px;
      color: var(--muted); cursor: pointer;
    }
    .tab-btn.active {
      background: var(--white); color: var(--ink); font-weight: 600;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .detail-body { padding: 0 20px; }
    .ing-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .ing-row:last-child { border-bottom: none; }
    .ing-name { font-size: 17px; color: var(--ink); }
    .ing-qty  { font-size: 14px; color: var(--muted); font-style: italic; }
    .step-row { display: flex; gap: 14px; margin: 10px 0; }
    .step-num { font-size: 22px; color: var(--gold); font-weight: 700; font-style: italic; width: 26px; flex-shrink: 0; line-height: 1.27; }
    .step-text { flex: 1; font-size: 16px; line-height: 1.6; color: #3A2E1E; padding-top: 2px; }

    /* ── Picker modal ────────────────────────────────────────────────────────── */
    .picker-search { padding: 10px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .search-input {
      width: 100%; padding: 10px 14px; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--white);
      font-family: inherit; font-size: 15px; color: var(--ink); outline: none;
    }
    .search-input:focus { border-color: var(--gold); }
    .picker-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--white); cursor: pointer;
    }
    .picker-row:active { background: rgba(196,168,130,.1); }

    /* ── Create modal ────────────────────────────────────────────────────────── */
    .progress-bar-row { display: flex; gap: 6px; padding: 12px 20px 4px; flex-shrink: 0; }
    .progress-seg { flex: 1; height: 3px; border-radius: 2px; background: var(--border); }
    .progress-seg.active { background: var(--dark); }
    .form-body { padding: 16px 20px; }
    .form-label { font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; }
    .form-input {
      width: 100%; padding: 12px 14px; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--white);
      font-family: inherit; font-size: 16px; color: var(--ink); outline: none;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-input.error { border-color: #c0392b; }
    .form-input-sm {
      padding: 9px 10px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--white);
      font-family: inherit; font-size: 14px; color: var(--ink); outline: none;
    }
    .form-input-sm:focus { border-color: var(--gold); }
    .error-msg { font-size: 13px; color: #c0392b; margin: 6px 0 4px; }
    .col-labels {
      display: flex; gap: 6px; margin-bottom: 8px;
      font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted);
    }
    .ing-form-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
    .rm-btn {
      width: 32px; font-size: 22px; color: var(--gold); background: none;
      border: none; cursor: pointer; font-weight: 300; line-height: 1;
      font-family: inherit; flex-shrink: 0;
    }
    .rm-btn:disabled { opacity: .25; cursor: default; }
    .add-row-btn {
      width: 100%; padding: 12px; border-radius: 10px;
      border: 1.5px dashed var(--border); background: none;
      font-family: inherit; font-size: 14px; color: var(--muted); cursor: pointer; margin-top: 6px;
    }
    .add-row-btn:active { opacity: .7; }
    .dir-form-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
    .dir-num-label {
      font-size: 22px; color: var(--gold); font-weight: 700; font-style: italic;
      width: 26px; flex-shrink: 0; padding-top: 10px; line-height: 1;
    }
    .dir-textarea {
      flex: 1; padding: 10px 12px; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--white);
      font-family: inherit; font-size: 15px; color: var(--ink); outline: none;
      resize: vertical; min-height: 70px; line-height: 1.5;
    }
    .dir-textarea:focus { border-color: var(--gold); }
    .modal-footer {
      display: flex; gap: 8px; padding: 12px 20px;
      border-top: 1px solid var(--border); align-items: center; flex-shrink: 0;
    }
    .back-btn {
      padding: 8px 14px; border-radius: 20px; border: none;
      background: none; font-family: inherit; font-size: 14px;
      color: var(--muted); cursor: pointer;
    }
    .next-btn {
      padding: 8px 16px; border-radius: 20px; background: var(--dark); border: none;
      font-family: inherit; font-size: 14px; color: #fff; font-weight: 600;
      cursor: pointer; margin-left: auto;
    }
    .save-btn {
      padding: 8px 16px; border-radius: 20px; background: #4a7c59; border: none;
      font-family: inherit; font-size: 14px; color: #fff; font-weight: 600;
      cursor: pointer; margin-left: auto;
    }

    /* ── Utilities ───────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Print styles ────────────────────────────────────────────────────────── */
    #print-book { display: none; }

    @media print {
      #app, .modal-overlay { display: none !important; }
      #print-book { display: block !important; }

      @page { margin: 2cm; }

      .print-cover {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        min-height: 90vh; text-align: center;
        page-break-after: always; break-after: page;
        font-family: Georgia, serif;
      }
      .print-cover-title { font-size: 52px; font-weight: 700; color: #1C1610; margin-bottom: 12px; }
      .print-cover-rule  { width: 80px; height: 3px; background: #C4A882; margin: 0 auto 20px; }
      .print-cover-sub   { font-size: 18px; color: #9A8060; font-style: italic; }

      .print-recipe {
        page-break-after: always; break-after: page;
        font-family: Georgia, serif; padding-top: 8px;
      }
      .print-recipe:last-child { page-break-after: avoid; break-after: avoid; }

      .print-recipe-title {
        font-size: 34px; font-weight: 700; color: #1C1610;
        border-bottom: 2.5px solid #C4A882;
        padding-bottom: 12px; margin-bottom: 28px;
      }

      .print-columns {
        display: grid; grid-template-columns: 1fr 1.6fr; gap: 48px;
      }

      .print-section-title {
        font-size: 10px; letter-spacing: 1.8px; text-transform: uppercase;
        color: #9A8060; margin-bottom: 14px;
      }

      .print-ing {
        display: flex; justify-content: space-between;
        padding: 8px 0; border-bottom: 1px solid #E5DDD0; font-size: 14px;
        break-inside: avoid;
      }
      .print-ing:last-child { border-bottom: none; }
      .print-ing-name { color: #1C1610; }
      .print-ing-qty  { color: #9A8060; font-style: italic; }

      .print-step { display: flex; gap: 14px; margin-bottom: 16px; break-inside: avoid; }
      .print-step-num  { font-size: 24px; color: #C4A882; font-weight: 700; font-style: italic; width: 28px; flex-shrink: 0; line-height: 1.2; }
      .print-step-text { font-size: 14px; line-height: 1.75; color: #3A2E1E; padding-top: 4px; }
    }
  </style>
</head>
<body>
  <!-- ── App shell ─────────────────────────────────────────────────────────── -->
  <div id="app">
    <main>

      <!-- Plan screen -->
      <div id="screen-plan" class="screen">
        <div class="screen-header">
          <div>
            <div class="eyebrow">This week</div>
            <div class="screen-title">Meal Plan</div>
            <div class="screen-sub" id="plan-count">0 meals planned</div>
          </div>
        </div>
        <div class="day-scroll" id="day-scroll"></div>
        <div class="day-label-row"><div class="day-label" id="day-label"></div></div>
        <div id="plan-slots"></div>
      </div>

      <!-- Recipes screen -->
      <div id="screen-recipes" class="screen hidden">
        <div class="screen-header">
          <div>
            <div class="eyebrow">Library</div>
            <div class="screen-title">Recipes</div>
          </div>
          <button class="icon-btn" id="btn-new-recipe" title="Add recipe">+</button>
        </div>
        <div id="saved-banner" class="banner hidden">✓ Recipe saved to your library!</div>
        <div id="recipe-list" class="recipe-list"></div>
      </div>

      <!-- Shopping screen -->
      <div id="screen-shopping" class="screen hidden">
        <div class="screen-header">
          <div>
            <div class="eyebrow">Auto-generated</div>
            <div class="screen-title">Shopping</div>
            <div class="screen-sub" id="shopping-sub"></div>
          </div>
          <button class="pill-btn hidden" id="btn-reset-shopping">Reset</button>
        </div>
        <div id="shopping-list"></div>
      </div>

      <!-- Book screen -->
      <div id="screen-book" class="screen hidden">
        <div class="screen-header">
          <div>
            <div class="eyebrow">Your collection</div>
            <div class="screen-title">Recipe Book</div>
          </div>
        </div>
        <div class="book-actions">
          <button class="book-btn primary" id="btn-print-book">🖨&nbsp; Print Book</button>
          <button class="book-btn" id="btn-export-yaml">⬇&nbsp; Export YAML</button>
          <button class="book-btn" id="btn-import-yaml">⬆&nbsp; Import YAML</button>
        </div>
        <input type="file" id="yaml-file-input" accept=".yaml,.yml" class="hidden">
        <div id="book-preview" class="book-preview"></div>
      </div>

    </main>

    <!-- Bottom nav -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="plan">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Plan</span>
      </button>
      <button class="nav-btn" data-tab="recipes">
        <span class="nav-icon">📖</span>
        <span class="nav-label">Recipes</span>
      </button>
      <button class="nav-btn" data-tab="shopping">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Shopping</span>
      </button>
      <button class="nav-btn" data-tab="book">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Book</span>
      </button>
    </nav>
  </div>

  <!-- ── Modals ─────────────────────────────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden">

    <!-- Recipe detail -->
    <div id="modal-detail" class="modal hidden">
      <div class="modal-handle"></div>
      <div class="detail-header">
        <div id="detail-recipe-name" class="detail-recipe-name"></div>
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="ingredients">🧂 Ingredients</button>
          <button class="tab-btn"        data-tab="directions">📋 Directions</button>
        </div>
      </div>
      <div class="modal-body detail-body" id="detail-body"></div>
    </div>

    <!-- Recipe picker -->
    <div id="modal-picker" class="modal hidden">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <button class="modal-cancel" id="picker-cancel">Cancel</button>
        <span class="modal-title" id="picker-title">Choose a recipe</span>
        <div style="width:60px"></div>
      </div>
      <div class="picker-search">
        <input type="text" class="search-input" id="picker-search" placeholder="Search recipes…" autocomplete="off">
      </div>
      <div class="modal-body" id="picker-list"></div>
    </div>

    <!-- Create recipe -->
    <div id="modal-create" class="modal hidden">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <button class="modal-cancel" id="create-cancel">Cancel</button>
        <span class="modal-title">New Recipe</span>
        <div style="width:60px"></div>
      </div>
      <div class="progress-bar-row" id="create-progress"></div>
      <div class="modal-body" id="create-body"></div>
      <div class="modal-footer" id="create-footer"></div>
    </div>

  </div>

  <!-- ── Print book (screen-hidden, print-visible) ──────────────────────────── -->
  <div id="print-book"></div>

  <script>
    /* ── Constants ────────────────────────────────────────────────────────────── */
    const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const DAYS_FULL  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    const SLOTS = [
      { key:'m', label:'Breakfast', icon:'☀️' },
      { key:'i', label:'Lunch',     icon:'🌤️' },
      { key:'s', label:'Dinner',    icon:'🌙' },
    ];
    const INITIAL_RECIPES = [
      { id:'1', name:'Avocado Toast',
        ingredients:[{name:'Sourdough bread',qty:'2',unit:'slices'},{name:'Avocado',qty:'1',unit:''},{name:'Lemon',qty:'0.5',unit:''},{name:'Red pepper flakes',qty:'1',unit:'tsp'}],
        directions:['Toast the sourdough until golden and crisp.','Halve and pit the avocado, scoop into a bowl.','Mash with lemon juice, salt, and pepper.','Spread over toast and finish with red pepper flakes.'] },
      { id:'2', name:'Greek Yogurt Bowl',
        ingredients:[{name:'Greek yogurt',qty:'200',unit:'g'},{name:'Honey',qty:'1',unit:'tbsp'},{name:'Granola',qty:'50',unit:'g'},{name:'Mixed berries',qty:'100',unit:'g'}],
        directions:['Spoon yogurt into a wide bowl.','Scatter granola over the top.','Add berries.','Drizzle with honey and serve.'] },
      { id:'3', name:'Shakshuka',
        ingredients:[{name:'Eggs',qty:'4',unit:''},{name:'Canned tomatoes',qty:'400',unit:'g'},{name:'Bell pepper',qty:'1',unit:''},{name:'Cumin',qty:'1',unit:'tsp'},{name:'Feta cheese',qty:'80',unit:'g'}],
        directions:['Sauté diced bell pepper in olive oil for 5 min.','Add tomatoes and cumin; simmer 10 min.','Make 4 wells and crack an egg into each.','Cover and cook 5–7 min. Top with feta.'] },
      { id:'4', name:'Lentil Soup',
        ingredients:[{name:'Red lentils',qty:'200',unit:'g'},{name:'Onion',qty:'1',unit:''},{name:'Garlic',qty:'3',unit:'cloves'},{name:'Vegetable broth',qty:'1',unit:'L'},{name:'Turmeric',qty:'1',unit:'tsp'}],
        directions:['Sauté diced onion and garlic until soft.','Add lentils, turmeric, and broth. Boil.','Simmer 20 min until lentils are tender.','Season and blend partially if desired.'] },
      { id:'5', name:'Caesar Salad',
        ingredients:[{name:'Romaine lettuce',qty:'1',unit:'head'},{name:'Parmesan',qty:'60',unit:'g'},{name:'Croutons',qty:'80',unit:'g'},{name:'Caesar dressing',qty:'3',unit:'tbsp'}],
        directions:['Tear romaine into bite-sized pieces.','Toss with Caesar dressing.','Add croutons and half the parmesan.','Plate and shave remaining parmesan over top.'] },
      { id:'6', name:'Pasta Aglio e Olio',
        ingredients:[{name:'Spaghetti',qty:'200',unit:'g'},{name:'Garlic',qty:'6',unit:'cloves'},{name:'Olive oil',qty:'4',unit:'tbsp'},{name:'Parsley',qty:'1',unit:'bunch'},{name:'Parmesan',qty:'40',unit:'g'}],
        directions:['Cook spaghetti al dente. Reserve 1 cup pasta water.','Warm sliced garlic gently in olive oil.','Add pasta and toss with pasta water until silky.','Finish with parsley and parmesan.'] },
      { id:'7', name:'Roast Chicken Thighs',
        ingredients:[{name:'Chicken thighs',qty:'4',unit:''},{name:'Garlic',qty:'4',unit:'cloves'},{name:'Lemon',qty:'1',unit:''},{name:'Rosemary',qty:'2',unit:'sprigs'},{name:'Olive oil',qty:'2',unit:'tbsp'}],
        directions:['Preheat oven to 220°C / 425°F.','Pat thighs dry; season well.','Arrange with garlic, lemon, and rosemary. Drizzle oil.','Roast 35–40 min until golden.'] },
      { id:'8', name:'Salmon & Greens',
        ingredients:[{name:'Salmon fillet',qty:'2',unit:''},{name:'Baby spinach',qty:'150',unit:'g'},{name:'Soy sauce',qty:'2',unit:'tbsp'},{name:'Sesame oil',qty:'1',unit:'tbsp'},{name:'Ginger',qty:'1',unit:'tsp'}],
        directions:['Whisk soy, sesame oil, and ginger.','Sear salmon skin-down 4 min, flip 2 min.','Wilt spinach in the same pan.','Plate greens, salmon, and drizzle glaze.'] },
      { id:'9', name:'Overnight Oats',
        ingredients:[{name:'Rolled oats',qty:'80',unit:'g'},{name:'Almond milk',qty:'200',unit:'ml'},{name:'Chia seeds',qty:'1',unit:'tbsp'},{name:'Maple syrup',qty:'1',unit:'tbsp'},{name:'Banana',qty:'1',unit:''}],
        directions:['Mix oats, milk, chia, and maple syrup in a jar.','Seal and refrigerate overnight.','Stir in the morning, add milk if thick.','Top with sliced banana.'] },
      { id:'10', name:'Steak & Potatoes',
        ingredients:[{name:'Ribeye steak',qty:'2',unit:''},{name:'Baby potatoes',qty:'300',unit:'g'},{name:'Butter',qty:'30',unit:'g'},{name:'Thyme',qty:'3',unit:'sprigs'},{name:'Garlic',qty:'2',unit:'cloves'}],
        directions:['Roast halved potatoes at 200°C for 30 min.','Season steaks and sear 3 min each side.','Baste with butter, garlic, thyme in last minute.','Rest 5 min before serving.'] },
    ];

    /* ── Utilities ────────────────────────────────────────────────────────────── */
    const uid   = () => `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    const fmtQ  = (q) => { const n = parseFloat(q)||0; if (!n) return ''; return Number.isInteger(n) ? String(n) : n.toFixed(1); };
    const esc   = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const $     = (id) => document.getElementById(id);

    /* ── State ────────────────────────────────────────────────────────────────── */
    const emptyPlan = () => DAYS_FULL.reduce((a,d) => { a[d]={m:null,i:null,s:null}; return a; }, {});

    let S = { recipes: INITIAL_RECIPES.map(r => ({...r})), plan: emptyPlan(), checkedItems: {} };

    function load() {
      try {
        const raw = localStorage.getItem('mealplanner-v1');
        if (!raw) return;
        const p = JSON.parse(raw);
        if (p.recipes)      S.recipes      = p.recipes;
        if (p.plan)         S.plan         = p.plan;
        if (p.checkedItems) S.checkedItems = p.checkedItems;
      } catch(_) {}
    }
    const save = () => { try { localStorage.setItem('mealplanner-v1', JSON.stringify(S)); } catch(_) {} };

    /* ── Tab navigation ───────────────────────────────────────────────────────── */
    let activeTab = 'plan';

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      $(`screen-${tab}`).classList.remove('hidden');
      document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active');
      renderTab(tab);
    }

    function renderTab(tab) {
      if (tab === 'plan')     renderPlan();
      if (tab === 'recipes')  renderRecipes();
      if (tab === 'shopping') renderShopping();
      if (tab === 'book')     renderBook();
    }

    /* ── Plan screen ──────────────────────────────────────────────────────────── */
    let activeDayIdx = 0;

    function renderPlan() {
      const total = Object.values(S.plan).flatMap(d => Object.values(d)).filter(Boolean).length;
      $('plan-count').textContent = `${total} meal${total !== 1 ? 's' : ''} planned`;
      renderDayChips();
      renderSlots();
    }

    function renderDayChips() {
      $('day-scroll').innerHTML = DAYS_SHORT.map((d, i) => {
        const full    = DAYS_FULL[i];
        const active  = i === activeDayIdx;
        const weekend = i >= 5;
        const hasAny  = Object.values(S.plan[full]).some(Boolean);
        return `<button class="day-chip${active?' active':''}${weekend&&!active?' weekend':''}" data-day="${i}">
          <span class="day-name">${d}</span>
          <span class="day-num">${i+1}</span>
          ${hasAny ? '<span class="day-chip-dot"></span>' : ''}
        </button>`;
      }).join('');
      $('day-label').textContent = DAYS_FULL[activeDayIdx];
      $('day-scroll').querySelectorAll('.day-chip').forEach(btn =>
        btn.addEventListener('click', () => { activeDayIdx = +btn.dataset.day; renderPlan(); })
      );
    }

    function renderSlots() {
      const day  = DAYS_FULL[activeDayIdx];
      const plan = S.plan[day];
      $('plan-slots').innerHTML = SLOTS.map(slot => {
        const r = plan[slot.key];
        if (r) {
          return `<div class="slot-card">
            <div class="slot-icon filled">${slot.icon}</div>
            <div class="slot-text">
              <div class="slot-label">${slot.label}</div>
              <div class="slot-name">${esc(r.name)}</div>
            </div>
            <div class="slot-actions">
              <button class="slot-action-btn" data-action="detail" data-slot="${slot.key}" title="View">📋</button>
              <button class="slot-action-btn remove" data-action="remove" data-slot="${slot.key}" title="Remove">×</button>
            </div>
          </div>`;
        }
        return `<div class="slot-card" data-action="pick" data-slot="${slot.key}">
          <div class="slot-icon">${slot.icon}</div>
          <div class="slot-text">
            <div class="slot-label">${slot.label}</div>
            <div class="slot-empty">Tap to add a recipe</div>
          </div>
          <div class="slot-add">+</div>
        </div>`;
      }).join('');

      $('plan-slots').querySelectorAll('[data-action="pick"]').forEach(el =>
        el.addEventListener('click', () => openPicker(el.dataset.slot))
      );
      $('plan-slots').querySelectorAll('[data-action="detail"]').forEach(btn =>
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const r = S.plan[DAYS_FULL[activeDayIdx]][btn.dataset.slot];
          if (r) openDetail(r);
        })
      );
      $('plan-slots').querySelectorAll('[data-action="remove"]').forEach(btn =>
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          S.plan[DAYS_FULL[activeDayIdx]][btn.dataset.slot] = null;
          save(); renderPlan();
        })
      );
    }

    /* ── Recipes screen ───────────────────────────────────────────────────────── */
    function renderRecipes() {
      const list = $('recipe-list');
      if (S.recipes.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div class="empty-icon">📖</div>
          <div class="empty-text">No recipes yet.<br>Tap + to create one.</div>
        </div>`;
        return;
      }
      list.innerHTML = S.recipes.map(r => `
        <div class="recipe-row" data-id="${esc(r.id)}">
          <div class="recipe-icon">🍽️</div>
          <div class="recipe-text">
            <div class="recipe-name">${esc(r.name)}</div>
            <div class="recipe-sub">${r.ingredients.length} ingredient${r.ingredients.length!==1?'s':''} · ${r.directions.length} step${r.directions.length!==1?'s':''}</div>
          </div>
          <button class="delete-btn" data-id="${esc(r.id)}" title="Delete">✕</button>
        </div>
      `).join('');

      list.querySelectorAll('.recipe-row').forEach(row =>
        row.addEventListener('click', (e) => {
          if (e.target.closest('.delete-btn')) return;
          const r = S.recipes.find(x => x.id === row.dataset.id);
          if (r) openDetail(r);
        })
      );
      list.querySelectorAll('.delete-btn').forEach(btn =>
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!confirm('Delete this recipe? It will also be removed from your meal plan.')) return;
          const id = btn.dataset.id;
          S.recipes = S.recipes.filter(r => r.id !== id);
          DAYS_FULL.forEach(d => SLOTS.forEach(s => {
            if (S.plan[d][s.key]?.id === id) S.plan[d][s.key] = null;
          }));
          save(); renderRecipes();
        })
      );
    }

    function showSavedBanner() {
      const b = $('saved-banner');
      b.classList.remove('hidden');
      setTimeout(() => b.classList.add('hidden'), 2500);
    }

    /* ── Shopping screen ──────────────────────────────────────────────────────── */
    function buildShoppingList() {
      const agg = {};
      Object.values(S.plan).forEach(dp =>
        Object.values(dp).forEach(r => {
          if (!r) return;
          r.ingredients.forEach(ing => {
            const k = ing.name.toLowerCase();
            if (!agg[k]) agg[k] = { name: ing.name, qty: 0, unit: ing.unit };
            agg[k].qty += parseFloat(ing.qty) || 0;
          });
        })
      );
      return Object.values(agg).sort((a,b) => a.name.localeCompare(b.name));
    }

    function renderShopping() {
      const list      = buildShoppingList();
      const remaining = list.filter(i => !S.checkedItems[i.name.toLowerCase()]).length;
      const resetBtn  = $('btn-reset-shopping');

      if (list.length === 0) {
        $('shopping-sub').textContent = '';
        resetBtn.classList.add('hidden');
        $('shopping-list').innerHTML = `<div class="empty-state">
          <div class="empty-icon">🧺</div>
          <div class="empty-text">Your basket is empty.<br>Plan some meals first.</div>
          <button class="go-btn" id="go-to-plan">Go to Plan →</button>
        </div>`;
        $('go-to-plan').addEventListener('click', () => switchTab('plan'));
        return;
      }

      $('shopping-sub').textContent = `${remaining} of ${list.length} remaining`;
      resetBtn.classList.remove('hidden');

      $('shopping-list').innerHTML = `<div class="shopping-list-wrap">` +
        list.map(item => {
          const k    = item.name.toLowerCase();
          const done = !!S.checkedItems[k];
          const qty  = item.qty;
          const qs   = qty > 0 ? `${Number.isInteger(qty)?qty:qty.toFixed(1)} ${item.unit}`.trim() : '';
          return `<div class="shopping-row${done?' done':''}" data-key="${esc(k)}">
            <div class="checkbox${done?' checked':''}"></div>
            <span class="shopping-name">${esc(item.name)}</span>
            ${qs ? `<span class="shopping-qty">${esc(qs)}</span>` : ''}
          </div>`;
        }).join('') + `</div>`;

      $('shopping-list').querySelectorAll('.shopping-row').forEach(row =>
        row.addEventListener('click', () => {
          const k = row.dataset.key;
          S.checkedItems[k] = !S.checkedItems[k];
          save(); renderShopping();
        })
      );
    }

    /* ── Book screen ──────────────────────────────────────────────────────────── */
    function renderBook() {
      const prev = $('book-preview');
      if (S.recipes.length === 0) {
        prev.innerHTML = `<div class="empty-state">
          <div class="empty-icon">📚</div>
          <div class="empty-text">No recipes yet.<br>Add some in the Recipes tab.</div>
        </div>`;
        return;
      }
      prev.innerHTML = S.recipes.map(r => `
        <div class="book-recipe-card">
          <div class="book-recipe-name">${esc(r.name)}</div>
          <div class="book-section-label">Ingredients</div>
          ${r.ingredients.map(ing => {
            const q = parseFloat(ing.qty)||0;
            return `<div class="book-ing-row">
              <span>${esc(ing.name)}</span>
              <span class="book-ing-qty">${q ? esc(fmtQ(ing.qty)+' '+ing.unit) : '—'}</span>
            </div>`;
          }).join('')}
          <div class="book-section-label" style="margin-top:14px">Directions</div>
          ${r.directions.map((d,i) => `
            <div class="book-dir-row">
              <span class="book-dir-num">${i+1}</span>
              <span class="book-dir-text">${esc(d)}</span>
            </div>`).join('')}
        </div>
      `).join('');
    }

    function buildPrintBook() {
      $('print-book').innerHTML =
        `<div class="print-cover">
          <div class="print-cover-title">My Recipe Book</div>
          <div class="print-cover-rule"></div>
          <div class="print-cover-sub">${S.recipes.length} recipe${S.recipes.length!==1?'s':''}</div>
        </div>` +
        S.recipes.map(r => `
          <div class="print-recipe">
            <div class="print-recipe-title">${esc(r.name)}</div>
            <div class="print-columns">
              <div>
                <div class="print-section-title">Ingredients</div>
                ${r.ingredients.map(ing => {
                  const q = parseFloat(ing.qty)||0;
                  return `<div class="print-ing">
                    <span class="print-ing-name">${esc(ing.name)}</span>
                    ${q ? `<span class="print-ing-qty">${esc(fmtQ(ing.qty)+' '+ing.unit)}</span>` : ''}
                  </div>`;
                }).join('')}
              </div>
              <div>
                <div class="print-section-title">Directions</div>
                ${r.directions.map((d,i) => `
                  <div class="print-step">
                    <span class="print-step-num">${i+1}</span>
                    <span class="print-step-text">${esc(d)}</span>
                  </div>`).join('')}
              </div>
            </div>
          </div>`
        ).join('');
    }

    /* ── YAML export / import ─────────────────────────────────────────────────── */
    function yamlStr(s) {
      s = String(s);
      if (!s) return '""';
      if (/[:#\[\]{}|>&*!,'"?@`]/.test(s) || /^\s/.test(s) || /\s$/.test(s) || s.includes('\n'))
        return '"' + s.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"';
      return s;
    }

    function exportYaml(recipes) {
      let out = 'recipes:\n';
      for (const r of recipes) {
        out += `  - name: ${yamlStr(r.name)}\n    ingredients:\n`;
        for (const ing of r.ingredients) {
          out += `      - name: ${yamlStr(ing.name)}\n`;
          if (ing.qty)  out += `        qty: "${ing.qty}"\n`;
          if (ing.unit) out += `        unit: ${yamlStr(ing.unit)}\n`;
        }
        out += `    directions:\n`;
        for (const d of r.directions) out += `      - ${yamlStr(d)}\n`;
      }
      return out;
    }

    function importYaml(text) {
      const unq = s => s.trim().replace(/^"(.*)"$/, (_,m) => m.replace(/\\"/g,'"').replace(/\\\\/g,'\\'));
      const recipes = [];
      let cur = null, section = null, curIng = null;

      for (const raw of text.split('\n')) {
        const indent = raw.match(/^(\s*)/)[1].length;
        const line   = raw.trim();
        if (!line || line.startsWith('#') || line === 'recipes:') continue;

        if (indent === 2 && line.startsWith('- name:')) {
          cur = { id: uid(), name: unq(line.slice(7)), ingredients: [], directions: [] };
          recipes.push(cur); section = null; curIng = null;
        } else if (!cur) {
          continue;
        } else if (indent === 4 && line === 'ingredients:') {
          section = 'ingredients';
        } else if (indent === 4 && line === 'directions:') {
          section = 'directions';
        } else if (section === 'ingredients' && indent === 6 && line.startsWith('- name:')) {
          curIng = { name: unq(line.slice(7)), qty: '', unit: '' };
          cur.ingredients.push(curIng);
        } else if (section === 'ingredients' && indent === 8 && curIng) {
          if (line.startsWith('qty:'))  curIng.qty  = unq(line.slice(4));
          if (line.startsWith('unit:')) curIng.unit = unq(line.slice(5));
        } else if (section === 'directions' && indent === 6 && line.startsWith('- ')) {
          cur.directions.push(unq(line.slice(2)));
        }
      }
      return recipes;
    }

    function downloadYaml() {
      const blob = new Blob([exportYaml(S.recipes)], { type: 'text/yaml' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: 'recipes.yaml' });
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ── Detail modal ─────────────────────────────────────────────────────────── */
    let detailActiveTab = 'ingredients';

    function openDetail(recipe) {
      detailActiveTab = 'ingredients';
      $('detail-recipe-name').textContent = recipe.name;
      renderDetailBody(recipe);
      document.querySelectorAll('#modal-detail .tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === 'ingredients');
        b.onclick = () => {
          detailActiveTab = b.dataset.tab;
          document.querySelectorAll('#modal-detail .tab-btn').forEach(x => x.classList.toggle('active', x === b));
          renderDetailBody(recipe);
        };
      });
      showModal('modal-detail');
    }

    function renderDetailBody(recipe) {
      if (detailActiveTab === 'ingredients') {
        $('detail-body').innerHTML =
          recipe.ingredients.map(ing => {
            const q = parseFloat(ing.qty)||0;
            return `<div class="ing-row">
              <span class="ing-name">${esc(ing.name)}</span>
              <span class="ing-qty">${q ? esc(fmtQ(ing.qty)+' '+ing.unit) : '—'}</span>
            </div>`;
          }).join('') + '<div style="height:20px"></div>';
      } else {
        $('detail-body').innerHTML =
          recipe.directions.map((step,i) => `
            <div class="step-row">
              <span class="step-num">${i+1}</span>
              <span class="step-text">${esc(step)}</span>
            </div>`
          ).join('') + '<div style="height:20px"></div>';
      }
    }

    /* ── Picker modal ─────────────────────────────────────────────────────────── */
    let pickerSlot = null;

    function openPicker(slotKey) {
      pickerSlot = slotKey;
      const slot = SLOTS.find(s => s.key === slotKey);
      $('picker-title').textContent = `Choose ${slot?.label || 'meal'}`;
      $('picker-search').value = '';
      renderPickerList('');
      $('picker-search').oninput = e => renderPickerList(e.target.value);
      showModal('modal-picker');
      setTimeout(() => $('picker-search').focus(), 100);
    }

    function renderPickerList(query) {
      const q        = query.toLowerCase();
      const filtered = S.recipes.filter(r => r.name.toLowerCase().includes(q));
      if (filtered.length === 0) {
        $('picker-list').innerHTML = `<div class="empty-state" style="padding:40px 20px"><div class="empty-text">No recipes match.</div></div>`;
        return;
      }
      $('picker-list').innerHTML = filtered.map(r => `
        <div class="picker-row" data-id="${esc(r.id)}">
          <div class="recipe-icon">🍽️</div>
          <div class="recipe-text">
            <div class="recipe-name">${esc(r.name)}</div>
            <div class="recipe-sub">${r.ingredients.length} ingredient${r.ingredients.length!==1?'s':''}</div>
          </div>
        </div>
      `).join('');
      $('picker-list').querySelectorAll('.picker-row').forEach(row =>
        row.addEventListener('click', () => {
          const r = S.recipes.find(x => x.id === row.dataset.id);
          if (!r || !pickerSlot) return;
          S.plan[DAYS_FULL[activeDayIdx]][pickerSlot] = r;
          save(); closeModal(); renderPlan();
        })
      );
    }

    /* ── Create recipe modal ──────────────────────────────────────────────────── */
    const STEPS = ['name','ingredients','directions'];
    let cStep = 'name', cName = '', cIngs = [], cDirs = [], cErr = {};

    const blankIng = () => ({ id: uid(), name: '', qty: '', unit: '' });
    const blankDir = () => ({ id: uid(), text: '' });

    function openCreate() {
      cStep = 'name'; cName = ''; cIngs = [blankIng()]; cDirs = [blankDir()]; cErr = {};
      renderCreate();
      showModal('modal-create');
    }

    function renderCreate() {
      const si = STEPS.indexOf(cStep);
      $('create-progress').innerHTML = STEPS.map((_,i) =>
        `<div class="progress-seg${si>=i?' active':''}"></div>`
      ).join('');

      if (cStep === 'name') {
        $('create-body').innerHTML = `<div class="form-body">
          <label class="form-label">Recipe Name</label>
          <input id="c-name" class="form-input${cErr.name?' error':''}" type="text" value="${esc(cName)}" placeholder="e.g. Mushroom Risotto" autocomplete="off">
          ${cErr.name ? '<div class="error-msg">Please enter a name.</div>' : ''}
        </div>`;
        $('create-footer').innerHTML = `<div style="flex:1"></div><button class="next-btn" id="c-next">Next →</button>`;
        const inp = $('c-name');
        inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
        inp.addEventListener('input', e => { cName = e.target.value; cErr = {}; });
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') $('c-next').click(); });
        $('c-next').onclick = () => {
          if (!cName.trim()) { cErr = {name:true}; renderCreate(); return; }
          cStep = 'ingredients'; cErr = {}; renderCreate();
        };

      } else if (cStep === 'ingredients') {
        $('create-body').innerHTML = `<div class="form-body">
          ${cErr.ings ? '<div class="error-msg">Add at least one ingredient.</div>' : ''}
          <div class="col-labels">
            <span style="flex:1">Ingredient</span>
            <span style="width:64px">Qty</span>
            <span style="width:72px">Unit</span>
            <span style="width:32px"></span>
          </div>
          <div id="ing-rows">${cIngs.map(ingRow).join('')}</div>
          <button class="add-row-btn" id="c-add-ing">+ Add ingredient</button>
        </div>`;
        $('create-footer').innerHTML = `<button class="back-btn" id="c-back">← Back</button><button class="next-btn" id="c-next">Next →</button>`;
        wireIngHandlers();
        $('c-add-ing').onclick = () => { cIngs.push(blankIng()); renderCreate(); };
        $('c-back').onclick   = () => { cStep='name'; cErr={}; renderCreate(); };
        $('c-next').onclick   = () => {
          if (!cIngs.some(i => i.name.trim())) { cErr={ings:true}; renderCreate(); return; }
          cStep='directions'; cErr={}; renderCreate();
        };

      } else {
        $('create-body').innerHTML = `<div class="form-body">
          ${cErr.dirs ? '<div class="error-msg">Add at least one step.</div>' : ''}
          <div id="dir-rows">${cDirs.map(dirRow).join('')}</div>
          <button class="add-row-btn" id="c-add-dir">+ Add step</button>
        </div>`;
        $('create-footer').innerHTML = `<button class="back-btn" id="c-back">← Back</button><button class="save-btn" id="c-save">Save ✓</button>`;
        wireDirHandlers();
        $('c-add-dir').onclick = () => { cDirs.push(blankDir()); renderCreate(); };
        $('c-back').onclick    = () => { cStep='ingredients'; cErr={}; renderCreate(); };
        $('c-save').onclick    = () => {
          if (!cDirs.some(d => d.text.trim())) { cErr={dirs:true}; renderCreate(); return; }
          S.recipes.push({
            id: uid(), name: cName.trim(),
            ingredients: cIngs.filter(i => i.name.trim()).map(i => ({ name:i.name.trim(), qty:i.qty, unit:i.unit.trim() })),
            directions:  cDirs.filter(d => d.text.trim()).map(d => d.text.trim()),
          });
          save(); closeModal(); showSavedBanner(); renderRecipes();
        };
      }
    }

    const ingRow = (ing) =>
      `<div class="ing-form-row">
        <input class="form-input-sm" style="flex:1" value="${esc(ing.name)}" placeholder="Garlic" data-field="name" data-id="${ing.id}">
        <input class="form-input-sm" style="width:64px" value="${esc(ing.qty)}" placeholder="2" data-field="qty" data-id="${ing.id}" inputmode="decimal">
        <input class="form-input-sm" style="width:72px" value="${esc(ing.unit)}" placeholder="cloves" data-field="unit" data-id="${ing.id}">
        <button class="rm-btn" data-rm-ing="${ing.id}" ${cIngs.length===1?'disabled':''}>−</button>
      </div>`;

    function wireIngHandlers() {
      $('ing-rows').querySelectorAll('.form-input-sm[data-id]').forEach(inp =>
        inp.addEventListener('input', e => {
          const ing = cIngs.find(i => i.id === e.target.dataset.id);
          if (ing) ing[e.target.dataset.field] = e.target.value;
        })
      );
      $('ing-rows').querySelectorAll('[data-rm-ing]').forEach(btn =>
        btn.addEventListener('click', () => {
          if (cIngs.length <= 1) return;
          cIngs = cIngs.filter(i => i.id !== btn.dataset.rmIng);
          renderCreate();
        })
      );
    }

    const dirRow = (dir, i) =>
      `<div class="dir-form-row">
        <span class="dir-num-label">${i+1}</span>
        <textarea class="dir-textarea" data-id="${dir.id}" placeholder="Step ${i+1}…">${esc(dir.text)}</textarea>
        <button class="rm-btn" data-rm-dir="${dir.id}" ${cDirs.length===1?'disabled':''}>−</button>
      </div>`;

    function wireDirHandlers() {
      $('dir-rows').querySelectorAll('.dir-textarea[data-id]').forEach(ta =>
        ta.addEventListener('input', e => {
          const d = cDirs.find(x => x.id === e.target.dataset.id);
          if (d) d.text = e.target.value;
        })
      );
      $('dir-rows').querySelectorAll('[data-rm-dir]').forEach(btn =>
        btn.addEventListener('click', () => {
          if (cDirs.length <= 1) return;
          cDirs = cDirs.filter(d => d.id !== btn.dataset.rmDir);
          renderCreate();
        })
      );
    }

    /* ── Modal helpers ────────────────────────────────────────────────────────── */
    function showModal(id) {
      $('modal-overlay').classList.remove('hidden');
      document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
      $(id).classList.remove('hidden');
    }
    function closeModal() {
      $('modal-overlay').classList.add('hidden');
      document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
    }

    /* ── Event wiring ─────────────────────────────────────────────────────────── */
    $('modal-overlay').addEventListener('click', e => {
      if (e.target === $('modal-overlay')) closeModal();
    });

    document.querySelectorAll('.nav-btn').forEach(btn =>
      btn.addEventListener('click', () => switchTab(btn.dataset.tab))
    );

    $('btn-new-recipe').addEventListener('click', openCreate);
    $('create-cancel').addEventListener('click', closeModal);
    $('picker-cancel').addEventListener('click', closeModal);

    $('btn-reset-shopping').addEventListener('click', () => { S.checkedItems = {}; save(); renderShopping(); });

    $('btn-print-book').addEventListener('click', () => { buildPrintBook(); window.print(); });
    $('btn-export-yaml').addEventListener('click', downloadYaml);
    $('btn-import-yaml').addEventListener('click', () => $('yaml-file-input').click());

    $('yaml-file-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const imported = importYaml(ev.target.result);
          if (!imported.length) { alert('No recipes found in file.'); return; }
          if (!confirm(`Import ${imported.length} recipe${imported.length!==1?'s':''}? They will be added to your existing library.`)) return;
          S.recipes.push(...imported);
          save(); renderBook();
          alert(`${imported.length} recipe${imported.length!==1?'s':''} imported successfully!`);
        } catch(_) {
          alert('Could not parse YAML file. Please check the format.');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    /* ── Init ─────────────────────────────────────────────────────────────────── */
    load();
    renderTab('plan');
  </script>
</body>
</html>
