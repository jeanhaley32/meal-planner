<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>mise · Meal Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Tokens ────────────────────────────────────────────────────────────── */
    :root {
      --bg:         #F8F7F3;
      --surface:    #FFFFFF;
      --surface-2:  #F2F1EC;
      --ink:        #1A1918;
      --ink-2:      #6B6660;
      --ink-3:      #B0ACA5;
      --green:      #3D6B4F;
      --green-dk:   #2D5540;
      --green-pale: #EBF2EE;
      --green-mid:  #C2D8C8;
      --border:     #E3E1DB;
      --border-2:   #EDECE7;
      --red:        #C53A3A;
      --red-pale:   #FEF1F1;
      --nav-h:      58px;
      --nav-w:      200px;
      --sb:         env(safe-area-inset-bottom, 0px);
      --r-sm:       8px;
      --r:          12px;
      --r-lg:       16px;
    }

    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100dvh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea { font-family: inherit; }
    svg { display: block; flex-shrink: 0; }

    /* ── App shell ─────────────────────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100dvh; }
    main { flex: 1; overflow: hidden; position: relative; }
    .screen {
      position: absolute; inset: 0; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--nav-h) + var(--sb) + 24px);
    }
    .screen.hidden { display: none !important; }

    /* ── Bottom nav — mobile ───────────────────────────────────────────────── */
    #sidebar {
      height: calc(var(--nav-h) + var(--sb));
      padding-bottom: var(--sb);
      background: rgba(248,247,243,0.96);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .nav-brand { display: none; }
    .nav-spacer { display: none; }

    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; background: none; border: none; padding: 0; position: relative;
    }
    .nav-icon { color: var(--ink-3); transition: color .18s; }
    .nav-label {
      font-size: 10px; font-weight: 500; letter-spacing: .6px;
      text-transform: uppercase; color: var(--ink-3); transition: color .18s;
    }
    .nav-btn.active .nav-icon  { color: var(--green); }
    .nav-btn.active .nav-label { color: var(--green); }
    .nav-btn.active::after {
      content: ''; position: absolute; bottom: 2px;
      width: 4px; height: 4px; border-radius: 50%; background: var(--green);
    }

    /* ── Screen header ─────────────────────────────────────────────────────── */
    .screen-header {
      padding: 20px 20px 14px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .wordmark {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic; font-size: 12px; color: var(--green);
      letter-spacing: .3px; margin-bottom: 6px;
    }
    .eyebrow {
      font-size: 10px; font-weight: 600; letter-spacing: 1.4px;
      text-transform: uppercase; color: var(--ink-3);
    }
    .screen-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 30px; font-weight: 700; color: var(--ink);
      letter-spacing: -.3px; line-height: 1.1; margin-top: 2px;
    }
    .screen-sub { font-size: 13px; color: var(--ink-2); margin-top: 3px; }

    /* ── Buttons ───────────────────────────────────────────────────────────── */
    .add-btn {
      width: 40px; height: 40px; border-radius: var(--r);
      background: var(--green); border: none;
      display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0; transition: background .15s;
    }
    .add-btn:active { background: var(--green-dk); }
    .pill-btn {
      padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface); font-size: 12px; font-weight: 500; color: var(--ink-2);
    }
    .pill-btn:active { opacity: .7; }
    .go-btn {
      margin-top: 20px; background: var(--green); border: none; border-radius: 24px;
      padding: 11px 28px; font-size: 14px; font-weight: 600; color: #fff;
    }
    .go-btn:active { background: var(--green-dk); }

    /* ── Plan — mobile (day chips) ─────────────────────────────────────────── */
    .day-scroll {
      display: flex; gap: 7px; padding: 0 20px;
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .day-scroll::-webkit-scrollbar { display: none; }
    .day-chip {
      width: 50px; height: 66px; border-radius: 14px;
      border: 1px solid var(--border); background: var(--surface);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; flex-shrink: 0; position: relative;
      transition: border-color .15s, background .15s;
    }
    .day-chip.active  { background: var(--green); border-color: var(--green); }
    .day-chip.weekend .day-name,
    .day-chip.weekend .day-num { color: var(--green); }
    .day-chip.active .day-name { color: rgba(255,255,255,.65); }
    .day-chip.active .day-num  { color: #fff; }
    .day-name { font-size: 9px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--ink-3); }
    .day-num  { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; font-weight: 700; color: var(--ink); }
    .day-chip-dot { width: 4px; height: 4px; border-radius: 50%; position: absolute; bottom: 7px; background: var(--green-mid); }
    .day-chip.active .day-chip-dot { background: rgba(255,255,255,.7); }
    .day-label-row { padding: 16px 20px 10px; }
    .day-label { font-family: 'Playfair Display', Georgia, serif; font-size: 17px; font-weight: 600; color: var(--ink); }

    /* ── Slot cards ────────────────────────────────────────────────────────── */
    .slot-card {
      display: flex; align-items: center; gap: 13px;
      background: var(--surface); border-radius: var(--r-lg);
      border: 1px solid var(--border); padding: 14px 14px 14px 16px;
      margin: 0 16px 9px; box-shadow: inset 3px 0 0 transparent;
      transition: box-shadow .15s;
    }
    .slot-card.filled { box-shadow: inset 3px 0 0 var(--green); }
    .slot-card:active { opacity: .88; }
    .slot-icon {
      width: 42px; height: 42px; border-radius: 11px; background: var(--surface-2);
      display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .slot-text  { flex: 1; min-width: 0; }
    .slot-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-3); }
    .slot-name  { font-family: 'Playfair Display', Georgia, serif; font-size: 15px; font-weight: 600; color: var(--ink); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .slot-empty { font-size: 13px; color: var(--ink-3); margin-top: 2px; }
    .slot-actions { display: flex; gap: 5px; flex-shrink: 0; }
    .slot-btn {
      width: 32px; height: 32px; border-radius: var(--r-sm); background: var(--surface-2);
      border: none; display: flex; align-items: center; justify-content: center; color: var(--ink-2);
    }
    .slot-btn.remove { color: var(--red); }
    .slot-btn:active { opacity: .7; }
    .slot-add {
      width: 28px; height: 28px; border-radius: var(--r-sm);
      border: 1.5px dashed var(--border);
      display: flex; align-items: center; justify-content: center; color: var(--ink-3); flex-shrink: 0;
    }

    /* ── Week grid (desktop plan) ──────────────────────────────────────────── */
    .week-grid {
      display: grid;
      grid-template-columns: 72px repeat(7, 1fr);
      gap: 5px 5px;
      padding: 4px 24px 24px;
    }
    .wk-corner { /* intentionally empty */ }
    .wk-day-hdr {
      text-align: center; padding: 8px 4px;
      border-radius: var(--r); background: var(--surface-2);
    }
    .wk-day-hdr.has-meals { background: var(--green-pale); }
    .wk-day-abbr { display: block; font-size: 9px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--ink-3); }
    .wk-day-full { display: none; } /* shown at wider widths */
    .wk-day-num  { display: block; font-family: 'Playfair Display', Georgia, serif; font-size: 19px; font-weight: 700; color: var(--ink); }
    .wk-slot-label {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; padding: 6px 0; align-self: center;
    }
    .wk-slot-icon { font-size: 15px; }
    .wk-slot-name { font-size: 9px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--ink-3); text-align: center; }
    .week-cell {
      min-height: 64px; border-radius: var(--r);
      border: 1px solid var(--border); cursor: pointer;
      position: relative; overflow: hidden; transition: border-color .15s, background .15s;
    }
    .week-cell.empty {
      background: var(--bg); border-style: dashed;
      display: flex; align-items: center; justify-content: center; color: var(--ink-3);
    }
    .week-cell.filled {
      background: var(--surface); box-shadow: inset 2px 0 0 var(--green);
      padding: 8px 8px 8px 10px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .wk-recipe-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 11px; font-weight: 600; color: var(--ink); line-height: 1.35;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .wk-clear {
      align-self: flex-end; width: 18px; height: 18px;
      border-radius: 4px; background: var(--surface-2); border: none;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-3); margin-top: 6px; flex-shrink: 0;
    }
    .wk-clear:hover { background: var(--red-pale); color: var(--red); }

    /* ── Recipe list ───────────────────────────────────────────────────────── */
    .recipe-list { border-top: 1px solid var(--border); }
    .recipe-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 20px; border-bottom: 1px solid var(--border-2);
      background: var(--surface); transition: background .12s;
    }
    .recipe-avatar {
      width: 40px; height: 40px; border-radius: var(--r);
      background: var(--green-pale);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px; font-weight: 700; color: var(--green);
      flex-shrink: 0; text-transform: uppercase;
    }
    .recipe-text { flex: 1; min-width: 0; }
    .recipe-name { font-family: 'Playfair Display', Georgia, serif; font-size: 15px; font-weight: 600; color: var(--ink); }
    .recipe-sub  { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
    .delete-btn {
      width: 30px; height: 30px; border-radius: var(--r-sm);
      background: var(--red-pale); border: none;
      display: flex; align-items: center; justify-content: center;
      color: var(--red); flex-shrink: 0;
    }
    .delete-btn:active { opacity: .7; }

    /* ── Shopping ──────────────────────────────────────────────────────────── */
    .shopping-list-wrap { border-top: 1px solid var(--border); }
    .shopping-row {
      display: flex; align-items: center; gap: 13px;
      padding: 14px 20px; border-bottom: 1px solid var(--border-2);
      background: var(--surface); transition: background .12s;
    }
    .shopping-row.done { background: var(--surface-2); }
    .shopping-row:active { opacity: .7; }
    .checkbox {
      width: 22px; height: 22px; border-radius: 6px;
      border: 1.5px solid var(--green-mid);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s, border-color .15s;
    }
    .checkbox.checked { background: var(--green); border-color: var(--green); }
    .checkbox.checked::after {
      content: ''; width: 11px; height: 7px;
      border-left: 2px solid #fff; border-bottom: 2px solid #fff;
      transform: translateY(-1px) rotate(-45deg); display: block;
    }
    .shopping-name { flex: 1; font-size: 16px; color: var(--ink); }
    .shopping-row.done .shopping-name { color: var(--ink-3); text-decoration: line-through; text-decoration-color: var(--ink-3); }
    .shopping-qty { font-size: 13px; color: var(--ink-3); font-style: italic; }

    /* ── Book ──────────────────────────────────────────────────────────────── */
    .book-actions {
      display: flex; gap: 8px; padding: 0 16px 16px; flex-wrap: wrap;
    }
    .book-btn {
      flex: 1; min-width: 130px; padding: 11px 14px; border-radius: var(--r);
      border: 1px solid var(--border); background: var(--surface);
      font-size: 13px; font-weight: 500; color: var(--ink);
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .book-btn.primary { background: var(--green); color: #fff; border-color: var(--green); }
    .book-btn:active { opacity: .8; }
    .book-preview { padding: 0 16px; }
    .book-recipe-card {
      background: var(--surface); border-radius: var(--r-lg);
      border: 1px solid var(--border); padding: 20px; margin-bottom: 10px;
    }
    .book-recipe-name { font-family: 'Playfair Display', Georgia, serif; font-size: 19px; font-weight: 700; color: var(--ink); margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .book-section-label { font-size: 9px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }
    .book-ing-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border-2); font-size: 13px; }
    .book-ing-row:last-of-type { border-bottom: none; }
    .book-ing-qty { color: var(--ink-3); font-style: italic; }
    .book-dir-row { display: flex; gap: 10px; padding: 5px 0; }
    .book-dir-num { font-family: 'Playfair Display', Georgia, serif; font-size: 16px; color: var(--green); font-style: italic; font-weight: 700; width: 20px; flex-shrink: 0; line-height: 1.5; }
    .book-dir-text { font-size: 13px; line-height: 1.6; color: var(--ink-2); }

    /* ── Shared states ─────────────────────────────────────────────────────── */
    .banner {
      margin: 0 16px 10px; background: var(--green-pale);
      border-radius: var(--r); padding: 11px 14px;
      border: 1px solid var(--green-mid);
      font-size: 13px; font-weight: 500; color: var(--green-dk);
    }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 72px 20px; text-align: center;
    }
    .empty-icon { font-size: 44px; margin-bottom: 14px; opacity: .6; }
    .empty-text { font-size: 15px; color: var(--ink-3); line-height: 1.6; }

    /* ── Modals — mobile (bottom sheets) ───────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(20,18,15,.5);
      z-index: 100; display: flex; flex-direction: column; justify-content: flex-end;
    }
    .modal-overlay.hidden { display: none !important; }
    .modal {
      background: var(--surface); border-radius: 20px 20px 0 0;
      max-height: 92dvh; display: flex; flex-direction: column;
      padding-bottom: var(--sb); box-shadow: 0 -4px 32px rgba(0,0,0,.12);
    }
    .modal.hidden { display: none !important; }
    .modal-handle { width: 32px; height: 3px; background: var(--border); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 20px; border-bottom: 1px solid var(--border-2); flex-shrink: 0; }
    .modal-title { font-family: 'Playfair Display', Georgia, serif; font-size: 16px; font-weight: 700; color: var(--ink); }
    .modal-cancel { font-size: 14px; font-weight: 500; color: var(--ink-2); background: none; border: none; padding: 2px 0; }
    .modal-cancel:active { opacity: .6; }
    .modal-body { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }

    .ing-row { display: flex; justify-content: space-between; align-items: baseline; padding: 11px 0; border-bottom: 1px solid var(--border-2); }
    .ing-row:last-child { border-bottom: none; }
    .ing-name { font-size: 15px; color: var(--ink); }
    .ing-qty  { font-size: 13px; color: var(--ink-3); font-style: italic; margin-left: 12px; }
    .step-row { display: flex; gap: 13px; margin: 9px 0; }
    .step-num  { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; color: var(--green); font-weight: 700; font-style: italic; width: 24px; flex-shrink: 0; line-height: 1.3; }
    .step-text { flex: 1; font-size: 15px; line-height: 1.65; color: var(--ink-2); padding-top: 2px; }

    /* ── Recipe page ──────────────────────────────────────────────────────── */
    .rp-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-bottom: 1px solid var(--border-2);
      position: sticky; top: 0; background: var(--bg); z-index: 5; flex-shrink: 0;
    }
    .rp-back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; font-weight: 500; color: var(--green);
      background: none; border: none; padding: 6px 2px; line-height: 1;
    }
    .rp-back-btn:active { opacity: .6; }
    .rp-hero {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 28px 24px 22px;
    }
    .rp-avatar {
      width: 72px; height: 72px; border-radius: 22px;
      background: var(--green-pale); color: var(--green);
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 32px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px; flex-shrink: 0;
    }
    .rp-hero-text { flex: 1; }
    .rp-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px; font-weight: 700; font-style: italic;
      color: var(--ink); letter-spacing: -.4px; line-height: 1.2;
      margin: 0 0 8px;
    }
    .rp-meta {
      font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--ink-3); margin: 0;
    }
    .rp-sections {
      display: flex; flex-direction: column;
      border-top: 1px solid var(--border);
    }
    .rp-section { padding: 20px 24px 28px; border-bottom: 1px solid var(--border-2); }
    .rp-section:last-child { border-bottom: none; }
    .rp-section-label {
      font-size: 9px; font-weight: 700; letter-spacing: 1.8px;
      text-transform: uppercase; color: var(--ink-3); margin-bottom: 14px;
    }
    .rp-name-input {
      width: 100%; border: none; background: none; outline: none;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px; font-weight: 700; font-style: italic;
      color: var(--ink); letter-spacing: -.4px; line-height: 1.2;
      border-bottom: 2px solid var(--green-mid); padding-bottom: 4px;
    }
    .rp-name-input::placeholder { color: var(--ink-3); }
    .rp-name-input:focus { border-bottom-color: var(--green); }
    .rp-name-input.error { border-bottom-color: var(--red); }
    .pill-save { background: var(--green) !important; color: #fff !important; border-color: var(--green) !important; }
    .pill-save:active { background: var(--green-dk) !important; }

    /* ── Picker modal ──────────────────────────────────────────────────────── */
    .picker-search { padding: 10px 16px; border-bottom: 1px solid var(--border-2); flex-shrink: 0; }
    .search-input {
      width: 100%; padding: 9px 13px; border-radius: var(--r);
      border: 1px solid var(--border); background: var(--surface-2);
      font-size: 14px; color: var(--ink); outline: none;
    }
    .search-input:focus { border-color: var(--green); background: var(--surface); }
    .picker-row { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border-2); background: var(--surface); }
    .picker-row:active { background: var(--green-pale); }

    /* ── Create form ───────────────────────────────────────────────────────── */
    .progress-bar-row { display: flex; gap: 5px; padding: 10px 20px 4px; flex-shrink: 0; }
    .progress-seg { flex: 1; height: 2px; border-radius: 2px; background: var(--border); }
    .progress-seg.active { background: var(--green); }
    .form-body { padding: 16px 20px; }
    .form-label { display: block; font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-3); margin-bottom: 7px; }
    .form-input { width: 100%; padding: 11px 13px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface); font-size: 15px; color: var(--ink); outline: none; }
    .form-input:focus { border-color: var(--green); }
    .form-input.error { border-color: var(--red); }
    .form-input-sm { padding: 8px 9px; border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--surface); font-size: 13px; color: var(--ink); outline: none; }
    .form-input-sm:focus { border-color: var(--green); }
    .error-msg { font-size: 12px; color: var(--red); margin: 5px 0 4px; }
    .col-labels { display: flex; gap: 6px; margin-bottom: 7px; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-3); }
    .ing-form-row { display: flex; gap: 6px; align-items: center; margin-bottom: 7px; }
    .rm-btn { width: 28px; height: 28px; border-radius: var(--r-sm); background: var(--red-pale); border: none; display: flex; align-items: center; justify-content: center; color: var(--red); flex-shrink: 0; }
    .rm-btn:disabled { opacity: .25; background: var(--surface-2); color: var(--ink-3); cursor: default; }
    .rm-btn:not(:disabled):active { opacity: .7; }
    .add-row-btn { width: 100%; padding: 10px; border-radius: var(--r-sm); border: 1px dashed var(--border); background: none; font-size: 13px; font-weight: 500; color: var(--ink-3); margin-top: 5px; }
    .add-row-btn:active { opacity: .7; }
    .dir-form-row { display: flex; gap: 11px; align-items: flex-start; margin-bottom: 10px; }
    .dir-num-label { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; color: var(--green); font-weight: 700; font-style: italic; width: 24px; flex-shrink: 0; padding-top: 9px; line-height: 1; }
    .dir-textarea { flex: 1; padding: 9px 11px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface); font-size: 14px; color: var(--ink); outline: none; resize: vertical; min-height: 68px; line-height: 1.55; }
    .dir-textarea:focus { border-color: var(--green); }
    .modal-footer { display: flex; gap: 8px; padding: 11px 20px; border-top: 1px solid var(--border-2); align-items: center; flex-shrink: 0; }
    .back-btn { padding: 8px 13px; border-radius: 20px; border: none; background: none; font-size: 13px; font-weight: 500; color: var(--ink-2); }
    .back-btn:active { opacity: .6; }
    .next-btn { padding: 8px 18px; border-radius: 20px; background: var(--green); border: none; font-size: 13px; font-weight: 600; color: #fff; margin-left: auto; }
    .next-btn:active { background: var(--green-dk); }
    .save-btn { padding: 8px 18px; border-radius: 20px; background: var(--green); border: none; font-size: 13px; font-weight: 600; color: #fff; margin-left: auto; }
    .save-btn:active { background: var(--green-dk); }

    /* ── Utility ───────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ════════════════════════════════════════════════════════════════════════
       DESKTOP  ≥ 700px
    ════════════════════════════════════════════════════════════════════════ */
    @media (min-width: 700px) {

      /* Layout flips to row — sidebar left, content right */
      #app { flex-direction: row; }

      main { flex: 1; overflow: hidden; }

      .screen {
        padding-bottom: 24px;
        padding-top: 0;
      }

      /* ── Sidebar ─────────────────────────────────────────────────────────── */
      #sidebar {
        width: var(--nav-w);
        height: 100dvh;
        padding-bottom: 0;
        flex-direction: column;
        border-top: none;
        border-right: 1px solid var(--border);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        background: var(--surface);
        order: -1;
        align-items: stretch;
        justify-content: flex-start;
        overflow: hidden;
      }

      .nav-brand {
        display: block;
        padding: 28px 20px 20px;
        border-bottom: 1px solid var(--border-2);
        flex-shrink: 0;
      }
      .nav-brand-wordmark {
        font-family: 'Playfair Display', Georgia, serif;
        font-style: italic; font-size: 24px; color: var(--ink);
        display: block; line-height: 1;
      }
      .nav-brand-sub {
        display: block; font-size: 9px; font-weight: 600;
        letter-spacing: 1.5px; text-transform: uppercase;
        color: var(--ink-3); margin-top: 5px;
      }

      .nav-btn {
        flex: none;
        flex-direction: row;
        justify-content: flex-start;
        padding: 11px 20px;
        gap: 12px;
        border-radius: 0;
        border-left: 2px solid transparent;
        transition: background .12s, border-color .12s;
      }
      .nav-btn::after { display: none; }
      .nav-btn.active {
        background: var(--green-pale);
        border-left-color: var(--green);
        padding-left: 18px;
      }
      .nav-btn:hover:not(.active) { background: var(--surface-2); }
      .nav-icon { color: var(--ink-3); width: 18px; height: 18px; }
      .nav-btn.active .nav-icon { color: var(--green); }
      .nav-label {
        font-size: 13px; font-weight: 500;
        text-transform: none; letter-spacing: 0; color: var(--ink-2);
      }
      .nav-btn.active .nav-label { color: var(--green-dk); font-weight: 600; }

      .nav-spacer { display: block; flex: 1; }

      /* ── Screen headers ──────────────────────────────────────────────────── */
      .screen-header { padding: 32px 28px 16px; }
      .screen-title  { font-size: 34px; }
      .wordmark { display: none; } /* sidebar has the brand */

      /* ── Plan: weekly grid visible, chips hidden ─────────────────────────── */
      .day-scroll, .day-label-row { display: none; }

      /* ── Slot cards (mobile) hidden on desktop ───────────────────────────── */
      /* rendered only in mobile path, so week-grid replaces them */

      /* ── Recipe grid ─────────────────────────────────────────────────────── */
      .recipe-list {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr);
        border-top: 1px solid var(--border);
        padding: 0;
      }
      .recipe-row {
        border-right: none;
        border-bottom: 1px solid var(--border-2) !important;
        padding: 16px 20px;
      }
      /* right column gets a left separator */
      .recipe-row:nth-child(odd)  { border-right: 1px solid var(--border-2); }

      /* ── Book preview grid ───────────────────────────────────────────────── */
      .book-preview {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 0 24px 24px;
      }
      .book-recipe-card { margin-bottom: 0; }

      /* ── Shopping max-width ──────────────────────────────────────────────── */
      .shopping-list-wrap { max-width: 680px; }
      #shopping-list      { max-width: 680px; }
      .screen-header > div:first-child { max-width: none; }

      /* ── Book actions better width ───────────────────────────────────────── */
      .book-actions { padding: 0 24px 20px; }

      /* ── Recipe page desktop ─────────────────────────────────────────────── */
      .rp-topbar { padding: 12px 28px; background: var(--surface); border-bottom: 1px solid var(--border-2); }
      .rp-hero {
        flex-direction: row; text-align: left; align-items: flex-start;
        padding: 32px 40px; gap: 22px;
        border-bottom: 1px solid var(--border-2);
      }
      .rp-avatar { margin-bottom: 0; width: 80px; height: 80px; border-radius: 24px; font-size: 36px; }
      .rp-title { font-size: 34px; }
      .rp-name-input { font-size: 34px; }
      .rp-sections { flex-direction: row; border-top: none; }
      .rp-section {
        flex: 1; padding: 28px 40px 48px;
        border-bottom: none; border-right: 1px solid var(--border-2);
      }
      .rp-section:first-child { flex: 0 0 300px; }
      .rp-section:last-child  { border-right: none; }

      /* ── Modals → centered dialogs ───────────────────────────────────────── */
      .modal-overlay {
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal {
        border-radius: var(--r-lg) !important;
        max-height: 86dvh;
        max-width: 540px;
        width: 100%;
        padding-bottom: 0;
        box-shadow: 0 8px 48px rgba(0,0,0,.16);
      }
      .modal-handle { display: none; }

      /* ── Week grid on wider screens ──────────────────────────────────────── */
      @media (min-width: 1100px) {
        .wk-day-abbr { display: none; }
        .wk-day-full { display: block; font-size: 10px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; color: var(--ink-3); }
        .wk-slot-name { font-size: 10px; }
        .wk-recipe-name { font-size: 12px; }
        .week-grid { grid-template-columns: 88px repeat(7, 1fr); }
      }
    }

    /* ── Hover states (pointer devices) ───────────────────────────────────── */
    @media (hover: hover) {
      .recipe-row:hover    { background: var(--green-pale); }
      .picker-row:hover    { background: var(--green-pale); }
      .slot-card:not(.filled):hover { border-color: var(--green-mid); }
      .week-cell.empty:hover { border-color: var(--green-mid); background: var(--green-pale); color: var(--green); }
      .week-cell.filled:hover { background: #fafaf7; }
      .day-chip:not(.active):hover { border-color: var(--green-mid); }
      .book-btn:hover:not(.primary) { background: var(--surface-2); }
      .book-btn.primary:hover { background: var(--green-dk); }
      .book-recipe-card:hover { background: var(--green-pale); }
    }

    /* ── Print ─────────────────────────────────────────────────────────────── */
    #print-book { display: none; }
    @media print {
      #app, .modal-overlay { display: none !important; }
      #print-book { display: block !important; }
      @page { margin: 2.2cm 2.5cm; }
      .print-cover {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; min-height: 85vh; text-align: center;
        page-break-after: always; break-after: page;
        font-family: 'Playfair Display', Georgia, serif;
      }
      .print-cover-eyebrow { font-family: 'Inter', Arial, sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #7A7A6E; margin-bottom: 24px; }
      .print-cover-title   { font-size: 52px; font-weight: 700; color: #18181A; line-height: 1.1; margin-bottom: 10px; }
      .print-cover-rule    { width: 48px; height: 3px; background: #3D6B4F; margin: 18px auto; }
      .print-cover-count   { font-style: italic; font-size: 17px; color: #7A7A6E; }
      .print-recipe        { page-break-after: always; break-after: page; font-family: 'Playfair Display', Georgia, serif; padding-top: 8px; }
      .print-recipe:last-child { page-break-after: avoid; break-after: avoid; }
      .print-recipe-title  { font-size: 36px; font-weight: 700; color: #18181A; padding-bottom: 14px; margin-bottom: 28px; border-bottom: 2px solid #3D6B4F; line-height: 1.1; }
      .print-columns       { display: grid; grid-template-columns: 1fr 1.7fr; gap: 52px; }
      .print-section-title { font-family: 'Inter', Arial, sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: #7A7A6E; margin-bottom: 14px; }
      .print-ing           { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #EDECE7; font-size: 13.5px; break-inside: avoid; }
      .print-ing:last-child { border-bottom: none; }
      .print-ing-name      { color: #18181A; }
      .print-ing-qty       { color: #7A7A6E; font-style: italic; }
      .print-step          { display: flex; gap: 14px; margin-bottom: 16px; break-inside: avoid; }
      .print-step-num      { font-size: 26px; color: #3D6B4F; font-weight: 700; font-style: italic; width: 28px; flex-shrink: 0; line-height: 1.15; }
      .print-step-text     { font-family: 'Inter', Arial, sans-serif; font-size: 13.5px; line-height: 1.75; color: #2A2825; padding-top: 5px; }
    }
  </style>
</head>
<body>
<div id="app">
  <main>

    <!-- Plan -->
    <div id="screen-plan" class="screen">
      <div class="screen-header">
        <div>
          <div class="wordmark">mise</div>
          <div class="eyebrow">This week</div>
          <div class="screen-title">Meal Plan</div>
          <div class="screen-sub" id="plan-count">0 meals planned</div>
        </div>
      </div>
      <div id="plan-content"></div>
    </div>

    <!-- Recipes -->
    <div id="screen-recipes" class="screen hidden">
      <div class="screen-header">
        <div>
          <div class="eyebrow">Library</div>
          <div class="screen-title">Recipes</div>
        </div>
        <button class="add-btn" id="btn-new-recipe" title="Add recipe" aria-label="Add recipe">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
<div id="recipe-list" class="recipe-list"></div>
    </div>

    <!-- Shopping -->
    <div id="screen-shopping" class="screen hidden">
      <div class="screen-header">
        <div>
          <div class="eyebrow">Auto-generated</div>
          <div class="screen-title">Shopping</div>
          <div class="screen-sub" id="shopping-sub"></div>
        </div>
        <button class="pill-btn hidden" id="btn-reset-shopping">Reset</button>
      </div>
      <div id="shopping-list"></div>
    </div>

    <!-- Book -->
    <div id="screen-book" class="screen hidden">
      <div class="screen-header">
        <div>
          <div class="eyebrow">Your collection</div>
          <div class="screen-title">Recipe Book</div>
        </div>
      </div>
      <div class="book-actions">
        <button class="book-btn primary" id="btn-print-book">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Book
        </button>
        <button class="book-btn" id="btn-export-yaml">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export YAML
        </button>
        <button class="book-btn" id="btn-import-yaml">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Import YAML
        </button>
      </div>
      <input type="file" id="yaml-file-input" accept=".yaml,.yml" class="hidden">
      <div id="book-preview" class="book-preview"></div>
    </div>

    <!-- Recipe page -->
    <div id="screen-recipe" class="screen hidden">
      <div class="rp-topbar" id="rp-topbar"></div>
      <div class="rp-hero" id="rp-hero"></div>
      <div class="rp-sections" id="rp-sections"></div>
    </div>

  </main>

  <!-- Nav / Sidebar -->
  <nav id="sidebar">
    <div class="nav-brand">
      <span class="nav-brand-wordmark">mise</span>
      <span class="nav-brand-sub">Meal Planner</span>
    </div>
    <button class="nav-btn active" data-tab="plan">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="nav-label">Plan</span>
    </button>
    <button class="nav-btn" data-tab="recipes">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span class="nav-label">Recipes</span>
    </button>
    <button class="nav-btn" data-tab="shopping">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span class="nav-label">Shopping</span>
    </button>
    <button class="nav-btn" data-tab="book">
      <svg class="nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span class="nav-label">Book</span>
    </button>
    <div class="nav-spacer"></div>
  </nav>
</div>

<!-- Modals -->
<div id="modal-overlay" class="modal-overlay hidden">

  <!-- Picker -->
  <div id="modal-picker" class="modal hidden">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <button class="modal-cancel" id="picker-cancel">Cancel</button>
      <span class="modal-title" id="picker-title">Choose a recipe</span>
      <div style="width:56px"></div>
    </div>
    <div class="picker-search">
      <input type="text" class="search-input" id="picker-search" placeholder="Search recipes…" autocomplete="off">
    </div>
    <div class="modal-body" id="picker-list"></div>
  </div>

</div>

<!-- Print book -->
<div id="print-book"></div>

<script>
  /* ── Constants ──────────────────────────────────────────────────────────── */
  const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const DAYS_FULL  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const SLOTS = [
    { key:'m', label:'Breakfast', abbr:'Bkf', icon:'☀️' },
    { key:'i', label:'Lunch',     abbr:'Lnch', icon:'🌤️' },
    { key:'s', label:'Dinner',    abbr:'Din', icon:'🌙' },
  ];
  const INITIAL_RECIPES = [
    { id:'1', name:'Avocado Toast', ingredients:[{name:'Sourdough bread',qty:'2',unit:'slices'},{name:'Avocado',qty:'1',unit:''},{name:'Lemon',qty:'0.5',unit:''},{name:'Red pepper flakes',qty:'1',unit:'tsp'}], directions:['Toast the sourdough until golden and crisp.','Halve and pit the avocado, scoop into a bowl.','Mash with lemon juice, salt, and pepper.','Spread over toast and finish with red pepper flakes.'] },
    { id:'2', name:'Greek Yogurt Bowl', ingredients:[{name:'Greek yogurt',qty:'200',unit:'g'},{name:'Honey',qty:'1',unit:'tbsp'},{name:'Granola',qty:'50',unit:'g'},{name:'Mixed berries',qty:'100',unit:'g'}], directions:['Spoon yogurt into a wide bowl.','Scatter granola over the top.','Add berries.','Drizzle with honey and serve.'] },
    { id:'3', name:'Shakshuka', ingredients:[{name:'Eggs',qty:'4',unit:''},{name:'Canned tomatoes',qty:'400',unit:'g'},{name:'Bell pepper',qty:'1',unit:''},{name:'Cumin',qty:'1',unit:'tsp'},{name:'Feta cheese',qty:'80',unit:'g'}], directions:['Sauté diced bell pepper in olive oil for 5 min.','Add tomatoes and cumin; simmer 10 min.','Make 4 wells and crack an egg into each.','Cover and cook 5–7 min. Top with feta.'] },
    { id:'4', name:'Lentil Soup', ingredients:[{name:'Red lentils',qty:'200',unit:'g'},{name:'Onion',qty:'1',unit:''},{name:'Garlic',qty:'3',unit:'cloves'},{name:'Vegetable broth',qty:'1',unit:'L'},{name:'Turmeric',qty:'1',unit:'tsp'}], directions:['Sauté diced onion and garlic until soft.','Add lentils, turmeric, and broth. Boil.','Simmer 20 min until lentils are tender.','Season and blend partially if desired.'] },
    { id:'5', name:'Caesar Salad', ingredients:[{name:'Romaine lettuce',qty:'1',unit:'head'},{name:'Parmesan',qty:'60',unit:'g'},{name:'Croutons',qty:'80',unit:'g'},{name:'Caesar dressing',qty:'3',unit:'tbsp'}], directions:['Tear romaine into bite-sized pieces.','Toss with Caesar dressing.','Add croutons and half the parmesan.','Plate and shave remaining parmesan over top.'] },
    { id:'6', name:'Pasta Aglio e Olio', ingredients:[{name:'Spaghetti',qty:'200',unit:'g'},{name:'Garlic',qty:'6',unit:'cloves'},{name:'Olive oil',qty:'4',unit:'tbsp'},{name:'Parsley',qty:'1',unit:'bunch'},{name:'Parmesan',qty:'40',unit:'g'}], directions:['Cook spaghetti al dente. Reserve 1 cup pasta water.','Warm sliced garlic gently in olive oil.','Add pasta and toss with pasta water until silky.','Finish with parsley and parmesan.'] },
    { id:'7', name:'Roast Chicken Thighs', ingredients:[{name:'Chicken thighs',qty:'4',unit:''},{name:'Garlic',qty:'4',unit:'cloves'},{name:'Lemon',qty:'1',unit:''},{name:'Rosemary',qty:'2',unit:'sprigs'},{name:'Olive oil',qty:'2',unit:'tbsp'}], directions:['Preheat oven to 220°C / 425°F.','Pat thighs dry; season well.','Arrange with garlic, lemon, and rosemary. Drizzle oil.','Roast 35–40 min until golden.'] },
    { id:'8', name:'Salmon & Greens', ingredients:[{name:'Salmon fillet',qty:'2',unit:''},{name:'Baby spinach',qty:'150',unit:'g'},{name:'Soy sauce',qty:'2',unit:'tbsp'},{name:'Sesame oil',qty:'1',unit:'tbsp'},{name:'Ginger',qty:'1',unit:'tsp'}], directions:['Whisk soy, sesame oil, and ginger.','Sear salmon skin-down 4 min, flip 2 min.','Wilt spinach in the same pan.','Plate greens, salmon, and drizzle glaze.'] },
    { id:'9', name:'Overnight Oats', ingredients:[{name:'Rolled oats',qty:'80',unit:'g'},{name:'Almond milk',qty:'200',unit:'ml'},{name:'Chia seeds',qty:'1',unit:'tbsp'},{name:'Maple syrup',qty:'1',unit:'tbsp'},{name:'Banana',qty:'1',unit:''}], directions:['Mix oats, milk, chia, and maple syrup in a jar.','Seal and refrigerate overnight.','Stir in the morning, add milk if thick.','Top with sliced banana.'] },
    { id:'10', name:'Steak & Potatoes', ingredients:[{name:'Ribeye steak',qty:'2',unit:''},{name:'Baby potatoes',qty:'300',unit:'g'},{name:'Butter',qty:'30',unit:'g'},{name:'Thyme',qty:'3',unit:'sprigs'},{name:'Garlic',qty:'2',unit:'cloves'}], directions:['Roast halved potatoes at 200°C for 30 min.','Season steaks and sear 3 min each side.','Baste with butter, garlic, thyme in last minute.','Rest 5 min before serving.'] },
  ];

  /* ── Utilities ──────────────────────────────────────────────────────────── */
  const uid  = () => `${Date.now()}-${Math.random().toString(36).slice(2)}`;
  const fmtQ = q => { const n=parseFloat(q)||0; if(!n) return ''; return Number.isInteger(n)?String(n):n.toFixed(1); };
  const esc  = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const $    = id => document.getElementById(id);
  const isDesktop = () => window.innerWidth >= 700;

  /* ── Shopping ────────────────────────────────────────────────────────────── */
  function buildShoppingList(){
    const agg={};
    Object.values(S.plan).forEach(dp=>Object.values(dp).forEach(r=>{
      if(!r) return;
      r.ingredients.forEach(ing=>{
        const k=ing.name.toLowerCase();
        if(!agg[k]) agg[k]={name:ing.name,qty:0,unit:ing.unit};
        agg[k].qty+=parseFloat(ing.qty)||0;
      });
    }));
    return Object.values(agg).sort((a,b)=>a.name.localeCompare(b.name));
  }

  function renderShopping(){
    const list=buildShoppingList();
    const rem=list.filter(i=>!S.checkedItems[i.name.toLowerCase()]).length;
    const resetBtn=$('btn-reset-shopping');

      $('shopping-sub').textContent='';

  /* ── YAML ────────────────────────────────────────────────────────────────── */
  function yamlStr(s){
    s=String(s); if(!s) return '""';
    if(/[:#\[\]{}|>&*!,'"?@`]/.test(s)||/^\s/.test(s)||/\s$/.test(s)||s.includes('\n'))
      return '"'+s.replace(/\\/g,'\\\\').replace(/"/g,'\\"')+'"';
    return s;
  }
  function exportYaml(recipes){
    let out='recipes:\n';
    for(const r of recipes){
      out+=`  - name: ${yamlStr(r.name)}\n    ingredients:\n`;
      for(const ing of r.ingredients){
        out+=`      - name: ${yamlStr(ing.name)}\n`;
        if(ing.qty)  out+=`        qty: "${ing.qty}"\n`;
        if(ing.unit) out+=`        unit: ${yamlStr(ing.unit)}\n`;
      }
      out+=`    directions:\n`;
      for(const d of r.directions) out+=`      - ${yamlStr(d)}\n`;
    }
    return out;
  }
  function importYaml(text){
    const unq=s=>s.trim().replace(/^"(.*)"$/,(_,m)=>m.replace(/\\"/g,'"').replace(/\\\\/g,'\\'));
    const recipes=[]; let cur=null,section=null,curIng=null;
    for(const raw of text.split('\n')){
      const indent=raw.match(/^(\s*)/)[1].length, line=raw.trim();
      if(!line||line.startsWith('#')||line==='recipes:') continue;
      if(indent===2&&line.startsWith('- name:')){
        cur={id:uid(),name:unq(line.slice(7)),ingredients:[],directions:[]}; recipes.push(cur); section=null; curIng=null;
      } else if(!cur){ continue;
      } else if(indent===4&&line==='ingredients:'){ section='ingredients';
      } else if(indent===4&&line==='directions:'){  section='directions';
      } else if(section==='ingredients'&&indent===6&&line.startsWith('- name:')){
        curIng={name:unq(line.slice(7)),qty:'',unit:''}; cur.ingredients.push(curIng);
      } else if(section==='ingredients'&&indent===8&&curIng){
        if(line.startsWith('qty:'))  curIng.qty =unq(line.slice(4));
        if(line.startsWith('unit:')) curIng.unit=unq(line.slice(5));
      } else if(section==='directions'&&indent===6&&line.startsWith('- ')){
        cur.directions.push(unq(line.slice(2)));
      }
    }
    return recipes;
  }
  function downloadYaml(){
    const blob=new Blob([exportYaml(S.recipes)],{type:'text/yaml'});
    const url=URL.createObjectURL(blob);
    Object.assign(document.createElement('a'),{href:url,download:'recipes.yaml'}).click();
    URL.revokeObjectURL(url);
  }

      <button class="rm-btn" data-rm-ing="${ing.id}" ${rpEditData.ings.length===1?'disabled':''}>${MINUS_SVG}</button>
    </div>`).join('');
    $('rp-ing-rows').querySelectorAll('.form-input-sm[data-id]').forEach(inp=>
      inp.addEventListener('input',e=>{const i=rpEditData.ings.find(x=>x.id===e.target.dataset.id); if(i) i[e.target.dataset.field]=e.target.value;})
    );
    $('rp-ing-rows').querySelectorAll('[data-rm-ing]').forEach(btn=>
      btn.addEventListener('click',()=>{if(rpEditData.ings.length<=1)return; rpEditData.ings=rpEditData.ings.filter(i=>i.id!==btn.dataset.rmIng); renderRpIngRows();})
    );
  }

  function renderRpDirRows(){
    $('rp-dir-rows').innerHTML=rpEditData.dirs.map((dir,i)=>`<div class="dir-form-row">
      <span class="dir-num-label">${i+1}</span>
      <textarea class="dir-textarea" data-id="${dir.id}" placeholder="Step ${i+1}…">${esc(dir.text)}</textarea>
      <button class="rm-btn" data-rm-dir="${dir.id}" ${rpEditData.dirs.length===1?'disabled':''}>${MINUS_SVG}</button>
    </div>`).join('');
    $('rp-dir-rows').querySelectorAll('.dir-textarea[data-id]').forEach(ta=>
      ta.addEventListener('input',e=>{const d=rpEditData.dirs.find(x=>x.id===e.target.dataset.id); if(d) d.text=e.target.value;})
    );
    $('rp-dir-rows').querySelectorAll('[data-rm-dir]').forEach(btn=>
      btn.addEventListener('click',()=>{if(rpEditData.dirs.length<=1)return; rpEditData.dirs=rpEditData.dirs.filter(d=>d.id!==btn.dataset.rmDir); renderRpDirRows();})
    );
  }

  function saveRecipePage(){
    const name=rpEditData.name.trim();
    const ings=rpEditData.ings.filter(i=>i.name.trim());
    const dirs=rpEditData.dirs.filter(d=>d.text.trim());
    if(!name){ const inp=$('rp-name-input'); inp.classList.add('error'); inp.focus(); return; }
    const recipe={
      id:rpIsNew?uid():rpCurrentRecipe.id, name,
      ingredients:ings.map(i=>({name:i.name.trim(),qty:i.qty,unit:i.unit.trim()})),
      directions:dirs.map(d=>d.text.trim()),
    };
    if(rpIsNew){
      S.recipes.push(recipe);
    } else {
      S.recipes=S.recipes.map(r=>r.id===recipe.id?recipe:r);
      DAYS_FULL.forEach(d=>SLOTS.forEach(s=>{if(S.plan[d][s.key]?.id===recipe.id) S.plan[d][s.key]=recipe;}));
    }
    save();
    rpIsNew=false; rpEditMode=false; rpCurrentRecipe=recipe;
    renderRpTopbar(); renderRpHero(); renderRpSections();
  }

  /* ── Picker modal ────────────────────────────────────────────────────────── */
  let pickerSlot=null;
  function openPicker(slotKey, dayIdx=activeDayIdx){
    activeDayIdx=dayIdx;
    pickerSlot=slotKey;
    const slot=SLOTS.find(s=>s.key===slotKey);
    $('picker-title').textContent=`Choose ${slot?.label||'meal'}`;
    $('picker-search').value='';
    renderPickerList('');
    $('picker-search').oninput=e=>renderPickerList(e.target.value);
    showModal('modal-picker');
    setTimeout(()=>$('picker-search').focus(),100);
  }
  function renderPickerList(query){
    const q=query.toLowerCase();
    const filtered=S.recipes.filter(r=>r.name.toLowerCase().includes(q));
    if(!filtered.length){
      $('picker-list').innerHTML=`<div class="empty-state" style="padding:40px 20px"><div class="empty-text">No recipes match.</div></div>`;
      return;
    }
    $('picker-list').innerHTML=filtered.map(r=>`
      <div class="picker-row" data-id="${esc(r.id)}">
        <div class="recipe-avatar">${esc(r.name.charAt(0).toUpperCase())}</div>
        <div class="recipe-text">
          <div class="recipe-name">${esc(r.name)}</div>
          <div class="recipe-sub">${r.ingredients.length} ingredient${r.ingredients.length!==1?'s':''}</div>
        </div>
      </div>`).join('');
    $('picker-list').querySelectorAll('.picker-row').forEach(row=>
      row.addEventListener('click',()=>{
        const r=S.recipes.find(x=>x.id===row.dataset.id);
        if(!r||!pickerSlot) return;
        S.plan[DAYS_FULL[activeDayIdx]][pickerSlot]=r;
        save(); closeModal(); renderPlan();
      })
    );
  }


  /* ── Modal helpers ───────────────────────────────────────────────────────── */
  function showModal(id){
    $('modal-overlay').classList.remove('hidden');
    document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
    $(id).classList.remove('hidden');
  }
  function closeModal(){
    $('modal-overlay').classList.add('hidden');
    document.querySelectorAll('.modal').forEach(m=>m.classList.add('hidden'));
  }

  /* ── Event wiring ────────────────────────────────────────────────────────── */
  $('modal-overlay').addEventListener('click',e=>{if(e.target===$('modal-overlay')) closeModal();});
  document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
  $('btn-new-recipe').addEventListener('click',openNewRecipePage);
  $('picker-cancel').addEventListener('click',closeModal);
  $('btn-reset-shopping').addEventListener('click',()=>{S.checkedItems={}; save(); renderShopping();});
  $('btn-print-book').addEventListener('click',()=>{buildPrintBook(); window.print();});
  $('btn-export-yaml').addEventListener('click',downloadYaml);
  $('btn-import-yaml').addEventListener('click',()=>$('yaml-file-input').click());
  $('yaml-file-input').addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imported=importYaml(ev.target.result);
        if(!imported.length){alert('No recipes found in file.'); return;}
        if(!confirm(`Import ${imported.length} recipe${imported.length!==1?'s':''}? They will be added to your existing library.`)) return;
        S.recipes.push(...imported); save(); renderBook();
        alert(`${imported.length} recipe${imported.length!==1?'s':''} imported successfully.`);
      }catch(_){alert('Could not parse YAML file.');}
    };
    reader.readAsText(file); e.target.value='';
  });

  /* Re-render plan when crossing the breakpoint */
  let resizeTimer;
  window.addEventListener('resize',()=>{
    clearTimeout(resizeTimer);
    resizeTimer=setTimeout(()=>{ if(activeTab==='plan') renderPlan(); },150);
  });

  /* ── Init ────────────────────────────────────────────────────────────────── */
  load();
  renderTab('plan');
</script>
</body>
</html>
